<svg width="1200" height="400" viewBox="0 0 1200 400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#111820"/>
    </linearGradient>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&amp;display=swap');
      text { font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="0" y1="1" x2="1200" y2="1" stroke="#21262d" stroke-width="1"/>
  <line x1="0" y1="399" x2="1200" y2="399" stroke="#21262d" stroke-width="1"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="3" height="400" fill="#58a6ff" opacity="0.6"/>

  <!-- Title -->
  <text x="60" y="90" font-size="52" font-weight="700" fill="#f0f6fc" letter-spacing="-2">brocode</text>
  <text x="60" y="122" font-size="14" fill="#6e7681" letter-spacing="0.5">Multi-agent SDLC plugin for Claude Code</text>

  <!-- Divider -->
  <line x1="60" y1="142" x2="560" y2="142" stroke="#21262d" stroke-width="1"/>

  <!-- Input line -->
  <text x="60" y="168" font-size="12" fill="#6e7681">▸ /brocode</text>
  <text x="140" y="168" font-size="12" fill="#cdd9e5">add Google OAuth login to our app</text>

  <!-- Flow lines -->
  <!-- TPM -->
  <text x="60" y="198" font-size="12" fill="#8b949e">📋</text>
  <text x="84" y="198" font-size="12" fill="#6e7681">TPM</text>
  <text x="116" y="198" font-size="12" fill="#8b949e">→</text>
  <text x="132" y="198" font-size="12" fill="#cdd9e5">brief.md written</text>

  <!-- PM -->
  <text x="60" y="220" font-size="12" fill="#d29922">🎯</text>
  <text x="84" y="220" font-size="12" fill="#6e7681">PM</text>
  <text x="104" y="220" font-size="12" fill="#8b949e">→</text>
  <text x="120" y="220" font-size="12" fill="#cdd9e5">product-spec.md — 3 personas, 12 ACs</text>

  <!-- Product BR challenge -->
  <text x="60" y="242" font-size="12" fill="#f85149">🔬</text>
  <text x="84" y="242" font-size="12" fill="#6e7681">Product BR</text>
  <text x="156" y="242" font-size="12" fill="#8b949e">→</text>
  <text x="172" y="242" font-size="12" fill="#ffa657">⚠ 2 challenges (round 1)</text>

  <!-- PM revised -->
  <text x="60" y="264" font-size="12" fill="#d29922">🎯</text>
  <text x="84" y="264" font-size="12" fill="#6e7681">PM</text>
  <text x="104" y="264" font-size="12" fill="#8b949e">→</text>
  <text x="120" y="264" font-size="12" fill="#cdd9e5">revised product-spec.md v2</text>

  <!-- Product BR approved -->
  <text x="60" y="286" font-size="12" fill="#3fb950">✅</text>
  <text x="84" y="286" font-size="12" fill="#6e7681">Product BR</text>
  <text x="156" y="286" font-size="12" fill="#8b949e">→</text>
  <text x="172" y="286" font-size="12" fill="#3fb950">product-spec.md APPROVED</text>

  <!-- Gate open -->
  <text x="60" y="308" font-size="12" fill="#3fb950">🔓</text>
  <text x="84" y="308" font-size="12" fill="#6e7681">TPM</text>
  <text x="116" y="308" font-size="12" fill="#8b949e">→</text>
  <text x="132" y="308" font-size="12" fill="#3fb950">product gate OPEN — engineering starts</text>

  <!-- Tech Lead -->
  <text x="60" y="330" font-size="12" fill="#58a6ff">🤝</text>
  <text x="84" y="330" font-size="12" fill="#6e7681">Tech Lead</text>
  <text x="152" y="330" font-size="12" fill="#8b949e">→</text>
  <text x="168" y="330" font-size="12" fill="#cdd9e5">dispatching team [parallel]</text>

  <!-- Engineers -->
  <text x="60" y="352" font-size="12" fill="#79c0ff">⚙️</text>
  <text x="84" y="352" font-size="12" fill="#79c0ff">Backend · Frontend · SRE · QA</text>
  <text x="312" y="352" font-size="12" fill="#8b949e">→</text>
  <text x="328" y="352" font-size="12" fill="#cdd9e5">scanning repos + knowledge base</text>

  <!-- Eng BR approved -->
  <text x="60" y="374" font-size="12" fill="#3fb950">✅</text>
  <text x="84" y="374" font-size="12" fill="#6e7681">Eng BR</text>
  <text x="128" y="374" font-size="12" fill="#8b949e">→</text>
  <text x="144" y="374" font-size="12" fill="#3fb950">engineering-spec.md + tasks.md APPROVED</text>

  <!-- Right panel: agent org -->
  <rect x="640" y="40" width="520" height="320" rx="8" fill="#161b22" stroke="#21262d" stroke-width="1"/>

  <!-- Panel header -->
  <text x="660" y="70" font-size="11" fill="#8b949e" letter-spacing="1">AGENT ORG</text>
  <line x1="660" y1="80" x2="1140" y2="80" stroke="#21262d" stroke-width="1"/>

  <!-- TPM row -->
  <text x="660" y="108" font-size="13" fill="#8b949e">📋</text>
  <text x="682" y="108" font-size="13" fill="#cdd9e5" font-weight="700">TPM</text>
  <text x="730" y="108" font-size="11" fill="#6e7681">— orchestrator, logs all transitions</text>

  <!-- Product track -->
  <text x="660" y="136" font-size="10" fill="#6e7681" letter-spacing="0.5">PRODUCT TRACK</text>
  <text x="672" y="157" font-size="12" fill="#d29922">🎯</text>
  <text x="692" y="157" font-size="12" fill="#cdd9e5">PM</text>
  <text x="716" y="157" font-size="11" fill="#6e7681">— product spec, personas, UX flows</text>
  <text x="672" y="177" font-size="12" fill="#f85149">🔬</text>
  <text x="692" y="177" font-size="12" fill="#cdd9e5">Product BR</text>
  <text x="770" y="177" font-size="11" fill="#6e7681">— gates engineering</text>

  <!-- Engineering track -->
  <text x="660" y="205" font-size="10" fill="#6e7681" letter-spacing="0.5">ENGINEERING TRACK</text>
  <text x="672" y="226" font-size="12" fill="#58a6ff">🤝</text>
  <text x="692" y="226" font-size="12" fill="#cdd9e5">Tech Lead</text>
  <text x="764" y="226" font-size="11" fill="#6e7681">— owns engineering team</text>

  <text x="688" y="247" font-size="12" fill="#79c0ff">⚙️</text>
  <text x="708" y="247" font-size="11" fill="#79c0ff">Backend · Frontend · Mobile</text>
  <text x="688" y="265" font-size="12" fill="#79c0ff">🚨</text>
  <text x="708" y="265" font-size="11" fill="#79c0ff">SRE</text>
  <text x="736" y="265" font-size="11" fill="#6e7681">— blast radius, rollback</text>
  <text x="688" y="283" font-size="12" fill="#79c0ff">🧪</text>
  <text x="708" y="283" font-size="11" fill="#79c0ff">QA</text>
  <text x="736" y="283" font-size="11" fill="#6e7681">— test matrix + coverage</text>
  <text x="672" y="304" font-size="12" fill="#f85149">⚖️</text>
  <text x="692" y="304" font-size="12" fill="#cdd9e5">Eng BR</text>
  <text x="742" y="304" font-size="11" fill="#6e7681">— gates final spec + tasks</text>

  <!-- Bottom tags -->
  <rect x="660" y="326" width="92" height="20" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="668" y="340" font-size="10" fill="#6e7681">investigate</text>

  <rect x="760" y="326" width="46" height="20" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="768" y="340" font-size="10" fill="#6e7681">spec</text>

  <rect x="814" y="326" width="58" height="20" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="822" y="340" font-size="10" fill="#6e7681">develop</text>

  <rect x="880" y="326" width="48" height="20" rx="3" fill="#161b22" stroke="#30363d" stroke-width="1"/>
  <text x="888" y="340" font-size="10" fill="#6e7681">review</text>
</svg>
